<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <!-- Local stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>


        <div class="container text-center">
            <h1 class="text-center" id="Title">Welcome to Hangman! Choose your difficulty to start playing!</h1>
            <button id="new-game" class="btn btn-primary ">New Game</button>
            <button id="reset-game" class="btn btn-secondary">Reset Game</button>
            <button id="hint" class="btn btn-danger">Hint</button>
        </div>

        <!-- Row 2 -->
        <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('a')">A</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('b')">B</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('c')">C</button>
            </div>
        </div>

        <!-- Row 3 -->
        <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('d')">D</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('e')">E</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('f')">F</button>
            </div>
            </div>

        <!-- Row 4 -->
        <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('g')">G</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('h')">H</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('i')">I</button>
            </div>
        </div>
        <!-- Row 5 -->
        <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('j')">J</button>
            </div>
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('k')">K</button>
            </div>
            <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('l')">L</button>
            </div>
            </div>
           <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('m')">M</button>
            </div>
        
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('n')">N</button>
            </div>
    <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('o')">O</button>
            </div>
        </div>
   <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('p')">P</button>
            </div>
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('q')">Q</button>
            </div>     
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('r')">R</button>
            </div>
        </div>
   <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('s')">S</button>
            </div>
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('t')">T</button>
            </div>
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('u')">U</button>
            </div>
        </div>
   <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('v')">V</button>
            </div>
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('w')">W</button>
            </div>
               <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('x')">X</button>
            </div>
        </div>
   <div class="row g-2 mb-2">
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('y')">Y</button>
            </div>
             <!-- Row 5 -->
            <div class="col-3">
                <button type="button" class="btn btn-light w-100" onclick="pressLetter('z')">Z</button>
            </div>
        </div>     <!-- Row 5 -->
  <div id="result1">
            <h2 id="word-display">_ _ _ _ _</h2>
            <p id="guessed-letters">Guessed Letters: </p>
            <p id="remaining-attempts">Remaining Attempts: 6</p>
        </div>
    <div id="result2">
            <h2 id="win-lose-message"></h2>
        </div>





    </header>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <!-- Local script -->
    <script src="app.js"></script>
</body>

</html>
