<!doctype html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Hangman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
  <div class="container py-4">
    <div class="game-box mx-auto">
      <h1 class="text-center mb-2">Board Game Hangman</h1>
      <p class="text-center" id="top-message">Choose a difficulty, then start guessing.</p>

      <div class="text-center mb-3" id="difficulty-area">
        <button id="easy-btn" class="btn btn-success m-1">Easy</button>
        <button id="medium-btn" class="btn btn-warning m-1">Medium</button>
        <button id="hard-btn" class="btn btn-danger m-1">Hard</button>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="panel-box h-100">
            <h3 class="text-center mb-3">Game Status</h3>

            <div class="health-wrap text-center mb-3">
              <img id="health-image" src="images/health6.png" alt="Health status" class="img-fluid health-image">
            </div>

            <h2 id="word-display" class="text-center mb-3">_ _ _ _</h2>

            <p id="used-letters" class="mb-2"><strong>Used Letters:</strong> None</p>
            <p id="wrong-letters" class="mb-2"><strong>Wrong Letters:</strong> None</p>
            <p id="remaining-guesses" class="mb-2"><strong>Guesses Remaining:</strong> 6</p>
            <p id="game-message" class="message-box">Game loaded. Pick a difficulty.</p>

            <div class="text-center mt-3">
              <button id="restart-btn" class="btn btn-secondary">Restart Game</button>
              <button id="menu-btn" class="btn btn-outline-dark">Back to Menu</button>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="panel-box h-100">
            <h3 class="text-center mb-3">Guess a Letter</h3>

            <div class="input-group mb-3">
              <input
                type="text"
                id="guess-input"
                class="form-control"
                maxlength="1"
                placeholder="Type one letter"
              >
              <button id="guess-btn" class="btn btn-primary">Guess</button>
            </div>

            <h4 id="result-message" class="text-center result-text"></h4>

            <div id="keyboard" class="keyboard mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
